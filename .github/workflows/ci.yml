name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  tests-and-showcase:
    name: Tests + Showcase
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run package tests
        run: npm test

      - name: Run showcase checks
        run: npm run ci:showcase
