name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  tests-and-showcase:
    name: Tests + Coverage + Showcase
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run package tests with coverage
        run: npm run test:cov

      - name: Capture coverage summary
        id: coverage
        run: |
          node -e "
          const fs = require('node:fs');
          const summary = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8')).total;
          const metrics = {
            statements: summary.statements.pct,
            branches: summary.branches.pct,
            functions: summary.functions.pct,
            lines: summary.lines.pct,
          };
          fs.appendFileSync(process.env.GITHUB_OUTPUT, Object.entries(metrics).map(([k, v]) => k + '=' + v).join('\n') + '\n');
          const report = [
            '### Coverage',
            '',
            '| Metric | % |',
            '| --- | ---: |',
            '| Statements | ' + metrics.statements + '% |',
            '| Branches | ' + metrics.branches + '% |',
            '| Functions | ' + metrics.functions + '% |',
            '| Lines | ' + metrics.lines + '% |',
          ].join('\n');
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, report + '\n');
          "

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage/coverage-summary.json
            coverage/lcov.info
            coverage/lcov-report/**
          if-no-files-found: error

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          STATEMENTS: ${{ steps.coverage.outputs.statements }}
          BRANCHES: ${{ steps.coverage.outputs.branches }}
          FUNCTIONS: ${{ steps.coverage.outputs.functions }}
          LINES: ${{ steps.coverage.outputs.lines }}
        with:
          script: |
            const marker = '<!-- coverage-report -->';
            const body = `${marker}
            ## Coverage Report
            | Metric | % |
            | --- | ---: |
            | Statements | ${process.env.STATEMENTS}% |
            | Branches | ${process.env.BRANCHES}% |
            | Functions | ${process.env.FUNCTIONS}% |
            | Lines | ${process.env.LINES}% |`;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
            });
            const existing = comments.find(
              comment => comment.user?.type === 'Bot' && comment.body?.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Run showcase checks
        run: npm run ci:showcase
